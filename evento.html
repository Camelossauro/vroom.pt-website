<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vroom.pt • Evento</title>
    <meta name="description" content="Detalhes do evento no Vroom.pt - Motorsport Hub Portugal" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/vroom-logo.jpg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vroom.pt • Evento Motorsport" />
    <meta property="og:description" content="Detalhes do evento no Vroom.pt" />
    <meta property="og:image" content="/vroom-logo.jpg" />
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Forward query parameter id/eventoID to main application
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('eventoID');
      if (id) {
        window.location.replace('/?event=' + encodeURIComponent(id));
      } else {
        window.location.replace('/');
      }
    </script>
  </body>
</html>
