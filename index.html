<!doctype html>
<html lang="pt-PT">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              console.warn("Vroom: Intercepted and ignored fetch overwrite attempt:", val);
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.error("Vroom: Failed to define safe fetch setter:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vroom.pt • Motorsport Hub Portugal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
