<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compra Concluída - Vroom.pt</title>
    <link rel="icon" type="image/png" href="https://joxalzicitgkaqpouvlb.supabase.co/storage/v1/object/public/eventimages/default/vroom.pt_logo_branco.png">
    <link rel="stylesheet" href="/src/style.css">
    <style>
      .success-page {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 140px 24px 80px;
      }
      .success-card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        padding: 60px 40px;
        border-radius: 32px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      }
      .success-icon {
        width: 80px;
        height: 80px;
        background: #10b981;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
      }
      .success-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 16px;
        letter-spacing: -1px;
      }
      .success-message {
        color: var(--text-secondary);
        font-size: 18px;
        margin-bottom: 40px;
      }
      .useful-links {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 32px;
        padding-top: 32px;
        border-top: 1px solid var(--border-color);
      }
      .useful-links h4 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .link-item {
        color: var(--accent-blue);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .link-item:hover {
        opacity: 0.8;
      }
      @media (max-width: 768px) {
        .success-page {
          padding-top: 100px;
        }
        .success-card {
          padding: 40px 24px;
        }
        .success-title {
          font-size: 24px;
        }
        .success-message {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav></nav>

    <main class="success-page">
      <div class="container">
        <div class="success-card animate-on-scroll">
          <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h1 class="success-title">Obrigado pela sua compra!</h1>
          <p class="success-message">
            Recebemos o seu formulário com sucesso. O seu evento será revisto e publicado nas próximas <strong>24 horas</strong>.
          </p>
          
          <a href="/" class="btn btn-primary w-full">Voltar à Página Inicial</a>

          <div class="useful-links">
            <h4>Links Úteis</h4>
            <a href="/#eventos" class="link-item">Ver outros eventos</a>
            <a href="https://www.instagram.com/vroom.pt/" target="_blank" class="link-item">Seguir no Instagram</a>
            <a href="mailto:contacto@vroomapp.pt" class="link-item">Contactar Suporte</a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer></footer>

    <script type="module" src="/src/sucesso.js"></script>
  </body>
</html>
