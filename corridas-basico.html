<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carros ou Motas? (Básico) - Vroom.pt</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
      .selection-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 160px 24px 80px;
        background: radial-gradient(circle at top right, rgba(2, 91, 197, 0.05), transparent),
                    radial-gradient(circle at bottom left, rgba(2, 91, 197, 0.05), transparent),
                    var(--bg-color);
      }

      @media (max-width: 768px) {
        .selection-page {
          padding: 80px 16px 40px;
        }
      }
      
      .selection-header {
        text-align: center;
        margin-bottom: 40px;
      }
      
      .selection-header h1 {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 16px;
        letter-spacing: -1.5px;
        background: linear-gradient(to bottom, var(--text-primary), var(--accent-blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .selection-header p {
        color: var(--text-secondary);
        font-size: 16px;
        max-width: 500px;
        margin: 0 auto;
      }
      
      .selection-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 24px;
        width: 100%;
        max-width: 800px;
      }

      .selection-card {
        background-color: var(--surface-color);
        border: 1px solid var(--border-color);
        padding: 40px 24px;
        border-radius: 24px;
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
      }

      .selection-card:hover {
        border-color: var(--accent-blue);
        transform: translateY(-12px);
        box-shadow: 0 30px 60px -15px rgba(2, 91, 197, 0.1);
      }

      .selection-icon {
        width: 64px;
        height: 64px;
        background-color: var(--accent-blue);
        color: white;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        transition: transform 0.5s ease;
      }

      .selection-card:hover .selection-icon {
        transform: scale(1.1) rotate(3deg);
      }

      .selection-card h2 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 16px;
        letter-spacing: -0.5px;
      }

      .selection-card p {
        color: var(--text-secondary);
        margin-bottom: 24px;
        font-size: 15px;
        line-height: 1.5;
      }

      .selection-card .btn {
        width: 100%;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav></nav>

    <main class="selection-page">
      <div class="container" style="margin-bottom: 24px; max-width: 800px; width: 100%; text-align: left;">
        <style>
          @media (max-width: 768px) {
            .back-container {
              margin-top: 60px;
            }
          }
        </style>
        <div class="back-container">
          <a href="javascript:history.back()" class="btn btn-outline btn-back" style="padding: 10px 20px; font-size: 13px; border-radius: 12px; display: inline-flex; align-items: center; gap: 8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Voltar
          </a>
        </div>
      </div>
      <div class="selection-header">
        <h1>Carros ou Motas?</h1>
        <p>Define o tipo de veículos para a tua corrida básica.</p>
      </div>
      
      <div class="selection-grid">
        <!-- Carros -->
        <a href="https://tally.so/r/J917Jo" class="selection-card" target="_blank">
          <div class="selection-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
          </div>
          <h2>Automóveis</h2>
          <p>Ralis, Drift, Track Days ou Velocidade.</p>
          <span class="btn btn-primary">Selecionar Automóveis</span>
        </a>

        <!-- Motas -->
        <a href="https://tally.so/r/xXJMyE" class="selection-card" target="_blank">
          <div class="selection-icon">
            <svg 
  xmlns="http://www.w3.org/2000/svg" 
  width="32" 
  height="32" 
  viewBox="0 0 24 24" 
  fill="none" 
  stroke="currentColor" 
  stroke-width="2" 
  stroke-linecap="round" 
  stroke-linejoin="round" 
  class="lucide lucide-motorbike"
>
  <path d="m18 14-1-3"/>
  <path d="m3 9 6 2a2 2 0 0 1 2-2h2a2 2 0 0 1 1.99 1.81"/>
  <path d="M8 17h3a1 1 0 0 0 1-1 6 6 0 0 1 6-6 1 1 0 0 0 1-1v-.75A5 5 0 0 0 17 5"/>
  <circle cx="19" cy="17" r="3"/>
  <circle cx="5" cy="17" r="3"/>
</svg>
</div>
          <h2>Motas</h2>
          <p>Motocross, Superbike ou Passeios.</p>
          <span class="btn btn-primary">Selecionar Motas</span>
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
